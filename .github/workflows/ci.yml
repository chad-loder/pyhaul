name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.14"
      - name: Install project
        run: uv sync --frozen --all-groups
      - name: ruff check
        run: uv run ruff check
      - name: ruff format --check
        run: uv run ruff format --check
      - name: mypy
        run: uv run mypy src tests
      - name: pyright
        run: uv run pyright
      - name: semgrep
        run: uvx semgrep scan --config=auto --quiet --emacs --error src/

  test-stable:
    name: Test (${{ contains(matrix.os, 'windows') && 'windows' || 'ubuntu' }} / Python ${{ matrix.python-version }})
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: ${{ matrix.python-version }}
      - name: Install project
        run: uv sync --frozen --all-groups
      - name: pytest
        run: uv run pytest --cov=src/pyhaul --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml

  test-prospective:
    name: Test (ubuntu / Python 3.15-dev, experimental)
    needs: [lint]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: python-3.15-dev-experimental
      - name: Install CPython 3.15-dev
        uses: deadsnakes/action@e640ac8743173a67cca4d7d77cd837e514bf98e8 # v3.2.0
        with:
          python-version: "3.15-dev"
      - name: Install project
        run: uv sync --python python3.15 --all-groups
      - name: pytest
        run: uv run pytest --cov=src/pyhaul --cov-report=xml --cov-report=term

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, test-stable]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Build
        run: uv build
      - name: Check distribution metadata
        run: |
          uv tool install twine
          uvx twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7
