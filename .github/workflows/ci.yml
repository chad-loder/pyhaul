name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.14"
      - name: Install project
        run: uv sync --frozen --all-groups
      - name: ruff check
        run: uv run ruff check
      - name: ruff format --check
        run: uv run ruff format --check
      - name: mypy
        run: uv run mypy src tests
      - name: pyright
        run: uv run pyright
      - name: ty
        run: uv run ty check
      - name: codespell
        run: uv run codespell src tests docs examples scripts
      - name: validate-pyproject
        run: uv run validate-pyproject pyproject.toml
      - name: interrogate
        run: uv run interrogate src/pyhaul/
      - name: semgrep
        run: uv run semgrep scan --config=auto --quiet --emacs --error src/

  build:
    name: Build & inspect package
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@fe0a0fb1925ca263d076ca4f2c13e93a6e92a33e # v2.17.0
        id: baipp

  test-stable:
    name: Test (${{ contains(matrix.os, 'windows') && 'windows' || 'ubuntu' }} / Python ${{ matrix.python-version }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ${{ fromJson(needs.build.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: Packages
          path: dist/
      # structlog: merge sdist tree into the workspace, then remove src/ so
      # imports cannot use the in-repo source tree; only the wheel (below) is used.
      - name: Unpack sdist and remove local src
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          tgz=(dist/*.tar.gz)
          if [ ${#tgz[@]} -eq 0 ]; then
            echo "No sdist (.tar.gz) in dist/ — BAIPP should upload sdist" >&2
            exit 1
          fi
          tar -xzf "${tgz[0]}" --strip-components=1
          rm -rf src
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: ${{ matrix.python-version }}
      - name: Install deps + wheel
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          uv sync --frozen --all-groups --no-install-project
          whl=(dist/pyhaul-*.whl)
          uv pip install --force-reinstall --no-deps "${whl[0]}"
      # --no-sync: without src/, uv would try to build the workspace project; the wheel is already installed.
      - name: pytest
        shell: bash
        run: uv run --no-sync pytest --cov=pyhaul --cov-report=term
      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data-${{ matrix.os }}-${{ matrix.python-version }}
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: ignore

  coverage:
    name: Ensure combined coverage threshold
    needs: [test-stable]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.14"
      - name: Install project
        run: uv sync --frozen --all-groups
      - name: Download coverage data
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: coverage-data-*
          merge-multiple: true
      - name: Combine and report
        run: |
          uv run coverage combine
          uv run coverage html --skip-covered --skip-empty
          uv run coverage report --format=markdown >> "${GITHUB_STEP_SUMMARY}"
          uv run coverage report --fail-under=85
          uv run coverage xml -o coverage.xml
      - name: Upload HTML report if check failed
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: htmlcov-report
          path: htmlcov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          name: combined
          token: ${{ secrets.CODECOV_TOKEN }}

  test-prospective:
    name: Test (ubuntu / Python 3.15-dev, experimental)
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: python-3.15-dev-experimental
      - name: Install CPython 3.15-dev
        uses: deadsnakes/action@e640ac8743173a67cca4d7d77cd837e514bf98e8 # v3.2.0
        with:
          python-version: "3.15-dev"
      - name: Install project
        run: uv sync --python python3.15 --all-groups
      - name: pytest
        run: uv run pytest

  install-dev:
    name: Verify extras install
    needs: [build]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: Packages
          path: dist/
      - name: Install wheel with all extras
        run: pip install "$(ls dist/pyhaul-*.whl)[niquests,requests,httpx,aiohttp]"
      - name: Verify import
        run: python -c "import pyhaul; print(pyhaul.__version__)"

  ci-ok:
    name: CI green
    if: always()
    needs: [lint, build, test-stable, test-prospective, install-dev, coverage]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          allowed-failures: test-prospective
          jobs: ${{ toJSON(needs) }}
