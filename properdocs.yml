site_name: pyhaul
site_description: Resumable, cursor-based, CDN-safe HTTP downloads for Python
site_url: https://chad-loder.github.io/pyhaul
repo_url: https://github.com/chad-loder/pyhaul
repo_name: chad-loder/pyhaul
edit_uri: edit/main/docs/

validation:
  anchors: warn

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - navigation.footer
    - navigation.sections
    - navigation.expand
    - toc.follow

exclude_docs: |
  DESIGN.md
  WHY.md
  SPEC.md
  PYPI_README.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list

plugins:
  - search
  - code-validator:
      identifiers:
        python:
          validators:
            - "python -c \"import ast,sys; ast.parse(sys.stdin.read())\""
        bash:
          validators:
            - bash -n
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Guides:
      - Bulk Downloads: guides/bulk-downloads.md
      - HTTP Client Adapters: guides/adapters.md
      - Writing a Custom Adapter: guides/custom-transport.md
      - Retry Patterns: guides/retry.md
      - Async Usage: guides/async.md
  - Explanation:
      - Why pyhaul Exists: explanation/why.md
      - Design & Architecture: explanation/design.md
  - Reference:
      - API: reference/api.md
      - Exceptions: reference/exceptions.md
      - Control File Spec: reference/spec.md
      - CLI: reference/cli.md
      - Changelog: reference/changelog.md
  - Contributing: contributing.md
